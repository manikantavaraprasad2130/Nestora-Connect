<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nestora Connect | Add Property</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #1c2d3d;
      background: #f4f7fa;
    }

    .page {
      min-height: 100vh;
      padding: 34px 20px 48px;
    }

    .topbar {
      width: min(980px, 100%);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      color: #12384f;
      font-size: 1.3rem;
      font-weight: 900;
      text-decoration: none;
    }

    .dashboard-link {
      color: #0f766e;
      font-weight: 900;
      text-decoration: none;
    }

    .dashboard-link:hover,
    .dashboard-link:focus {
      text-decoration: underline;
    }

    .form-shell {
      width: min(980px, 100%);
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid #dce6ee;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 44px rgba(17, 38, 58, 0.1);
    }

    .form-header {
      padding: 30px;
      color: #ffffff;
      background:
        linear-gradient(90deg, rgba(18, 56, 79, 0.96), rgba(15, 118, 110, 0.88)),
        url("https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?auto=format&fit=crop&w=1100&q=85") center/cover;
    }

    .form-header h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .form-header p {
      max-width: 660px;
      color: #e5eef3;
      line-height: 1.6;
    }

    form {
      padding: 30px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    label {
      color: #26394c;
      font-size: 0.94rem;
      font-weight: 900;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid #c9d4df;
      border-radius: 8px;
      color: #142638;
      background: #f9fbfd;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    select {
      cursor: pointer;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.6;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #0f766e;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.13);
    }

    input[type="file"] {
      padding: 11px;
      cursor: pointer;
    }

    .upload-note {
      color: #68798a;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .submit-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .submit-button {
      min-width: 190px;
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: #12384f;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .submit-button:hover,
    .submit-button:focus {
      background: #0f766e;
      transform: translateY(-1px);
    }

    @media (max-width: 720px) {
      .page {
        padding: 22px 14px 34px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .form-header,
      form {
        padding: 22px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .submit-row {
        justify-content: stretch;
      }

      .submit-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="topbar" aria-label="Add property navigation">
      <a class="brand" href="owner-dashboard.html">Nestora Owner</a>
      <a class="dashboard-link" href="owner-dashboard.html">Back to Dashboard</a>
    </nav>

    <section class="form-shell">
      <header class="form-header">
        <h1>Add Property</h1>
        <p>List a rental property with clear details, pricing, and photos so customers can quickly find the right home.</p>
      </header>

      <form id="addPropertyForm" action="#" method="post" enctype="multipart/form-data">
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="property-name">Property Name</label>
            <input type="text" id="property-name" name="property-name" placeholder="Luxury Garden Villa" required>
          </div>

          <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" placeholder="Enter location (city, area)" required>
          </div>

          <div class="form-group">
            <label for="state">State</label>
            <input type="text" id="state" name="state" placeholder="Enter state" required>
          </div>

          <div class="form-group">
            <label for="pincode">Pin Code</label>
            <input type="text" id="pincode" name="pincode" placeholder="Enter pin code" required>
          </div>

          <div class="form-group">
            <label for="district">District</label>
            <input type="text" id="district" name="district" placeholder="Enter district" required>
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city" placeholder="Enter city" required>
          </div>

          <div class="form-group">
            <label for="village">Village</label>
            <input type="text" id="village" name="village" placeholder="Enter village (if applicable)">
          </div>

          <div class="form-group">
            <label for="house-number">House Number</label>
            <input type="text" id="house-number" name="house-number" placeholder="Enter house number" required>
          </div>

          <div class="form-group">
            <label for="street">Street</label>
            <input type="text" id="street" name="street" placeholder="Enter street" required>
          </div>

          <div class="form-group">
            <label for="property-type">Property Type</label>
            <select id="property-type" name="property-type" required>
              <option value="">Select property type</option>
              <option value="villa">Villa</option>
              <option value="apartment">Apartment</option>
              <option value="penthouse">Penthouse</option>
              <option value="independent-house">Independent House</option>
              <option value="farmhouse">Farmhouse</option>
            </select>
          </div>

          <div class="form-group">
            <label for="rent-price">Rent Price</label>
            <input type="number" id="rent-price" name="rent-price" placeholder="75000" min="0" required>
          </div>

          <div class="form-group">
            <label for="owner-name">Owner Name</label>
            <input type="text" id="owner-name" name="owner-name" placeholder="Owner Name">
          </div>

          <div class="form-group">
            <label for="owner-phone">Owner Phone Number</label>
            <input type="tel" id="owner-phone" name="phone-number" placeholder="Enter contact phone number">
          </div>

          <div class="form-group">
            <label for="owner-email">Owner Gmail</label>
            <input type="email" id="owner-email" name="email" placeholder="owner@gmail.com">
          </div>

          <div class="form-group">
            <label for="bedrooms">Bedrooms</label>
            <input type="number" id="bedrooms" name="bedrooms" placeholder="3" min="0" required>
          </div>

          <div class="form-group">
            <label for="bathrooms">Bathrooms</label>
            <input type="number" id="bathrooms" name="bathrooms" placeholder="2" min="0" required>
          </div>

          <div class="form-group full-width">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Describe the property, amenities, nearby landmarks, parking, furnishing, and availability." required></textarea>
          </div>

          <div class="form-group full-width">
            <label for="house-images">Upload House Images</label>
            <input type="file" id="house-images" name="house-images" accept="image/*" multiple required>
            <p class="upload-note">Upload one or more clear images of the exterior, living area, bedrooms, kitchen, and bathrooms.</p>
          </div>
        </div>

        <div class="submit-row">
          <button class="submit-button" type="submit">Submit Property</button>
        </div>
      </form>
    </section>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
